name: Tests

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

# Ничего не публикует, поэтому отменяем прошлый прогон всегда: при серии пушей в
# одну ветку/PR полезен только результат последнего коммита. Группа с github.ref
# держит ветки и PR независимыми (у PR ref = refs/pull/N/merge).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    # Прогон занимает пару минут; лимит страхует от зависшего теста.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  js-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install JS deps
        run: npm ci
      - name: Vitest (чистые функции фронта)
        run: npx vitest run

  js-e2e:
    runs-on: ubuntu-latest
    # Дольше остальных: ставит Chrome для Playwright и поднимает приложение.
    # Лимит важен именно здесь — зависший браузер молчит и не падает сам.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install JS deps
        run: npm ci
      - name: Install Chrome for Playwright
        run: npx playwright install --with-deps chrome
      - name: Playwright (сценарии)
        run: npx playwright test
        env:
          HOST: 127.0.0.1
          PORT: "8765"
          PYTHON: python
