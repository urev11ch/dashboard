name: Windows build

on:
  push:
    branches: [main]
    # Тег vX.Y.Z дополнительно публикует GitHub Release — его читает проверка
    # обновлений в приложении (GET /api/update-check → releases/latest).
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

# Группа включает github.ref, поэтому прогон по тегу v* и прогон по main живут в
# РАЗНЫХ группах и не отменяют друг друга (при релизе оба указывают на один
# коммит). cancel-in-progress выключен для тегов: такой прогон публикует GitHub
# Release, и отмена на середине оставила бы релиз без части файлов.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build:
    runs-on: windows-latest
    # Полная сборка укладывается в ~15 минут. Лимит нужен против зависаний без
    # вывода (Invoke-WebRequest за WebView2, choco), которые иначе держали бы
    # раннер дефолтные 6 часов.
    timeout-minutes: 30
    permissions:
      # Нужно шагу «Publish GitHub Release» (gh release create). На сборках из
      # main право не используется, но задаётся на job целиком.
      contents: write
    env:
      # true, если в репозитории заданы секреты для подписи кода
      HAS_SIGNING: ${{ secrets.WINDOWS_PFX_BASE64 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        # Версия зафиксирована (та же, что в build_windows.bat): на 3.13+ нет
        # готовых колёс pythonnet/pywebview.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # Кэш колёс pip: pythonnet/pywebview/uvicorn тянутся на каждой сборке.
          cache: pip
          cache-dependency-path: requirements-windows.txt

      - name: Install dependencies
        # Версии закреплены в requirements-windows.txt — сборка воспроизводима.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-windows.txt

      # Тесты здесь НЕ гоняются намеренно. Их прогоняет workflow «Tests»
      # (tests.yml) на ubuntu-latest при каждом push в main и в каждом PR.
      # На windows-latest часть тестов падает by design: test_runtime_paths
      # проверяет POSIX-специфику Linux-ветки кода (права 0o700 — Windows даёт
      # 0o777, XDG-пути, симлинки), а monkeypatch platform="linux" на Windows
      # даёт WindowsPath, не совпадающий с ожидаемым POSIX-путём. Эти проверки
      # валидны только на Linux, где они и выполняются. Импорт кода под Windows
      # проверяет шаг Build executable (PyInstaller Analysis выполняет импорты).

      - name: Resolve app version
        # Единый источник версии — webapp/__init__.py (__version__): его читают
        # webapp.app, spec-файл (version_info.txt) и установщик.
        id: app_version
        run: |
          $version = python -c "import webapp; print(webapp.__version__)"
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Verify tag matches app version
        # Fail fast до сборки: иначе релиз v1.2.0 мог бы уехать с бинарником
        # 1.1.0, и проверка обновлений у клиентов зациклилась бы на «доступно
        # обновление» — установили, а версия та же.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $version = "${{ steps.app_version.outputs.value }}"
          if ($tag -ne $version) {
            Write-Error "Тег $tag не совпадает с webapp/__init__.py ($version). Обновите __version__ или тег."
            exit 1
          }
          Write-Host "Тег $tag совпадает с версией приложения."

      - name: Build executable
        run: pyinstaller --noconfirm OptiCIP-Dashboard.spec

      - name: Smoke test executable
        # Единственное место, где собранный .exe РЕАЛЬНО запускается до релиза.
        # Без этого шага «собралось» = «файл есть на диске»: Analysis у
        # PyInstaller разрешает только статические импорты, а шаг Upload с
        # if-no-files-found: error проверяет лишь наличие файла. Именно так до
        # заводских ПК доехал баг «Failed to load Python DLL» (чинили в
        # 64116b5) — сборка была зелёной, бинарник не стартовал ни на одной
        # машине.
        #
        # --selftest (run_wash_desktop.py, run_selftest) сделан ровно под этот
        # шаг: он поднимает те же тяжёлые зависимости, что и обычный старт —
        # `import webview`, мост pythonnet (load("netfx") + clr.AddReference) и
        # FastAPI-приложение, — но НЕ открывает окно (на раннере нет сессии
        # рабочего стола) и выходит кодом.
        #
        # ЧТО ловит: распаковку onefile-бутлоадера, загрузку Python DLL (класс
        # 64116b5), топ-левел импорты, collect_all(webview) и мост pythonnet/clr.
        # То есть весь набор, который иначе всплывал бы только у оператора при
        # открытии окна.
        #
        # НЕ подходил --remove-autostart: он возвращает код ДО `import webview`,
        # поэтому сломанный webview-хиддeнимпорт прошёл бы CI незамеченным.
        #
        # Start-Process, а не прямой вызов: exe собран с console=False
        # (windowed), консоль его не дожидается и код возврата теряется.
        # Путь резолвим в абсолютный — Start-Process берёт рабочий каталог из
        # [Environment]::CurrentDirectory, а не из текущей локации PowerShell.
        run: |
          $exe = (Resolve-Path "dist\OptiCIP-Dashboard.exe").Path
          $p = Start-Process $exe -ArgumentList '--selftest' -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            Write-Error "Собранный .exe завершился с кодом $($p.ExitCode) — бинарник нерабочий, релиз останавливаем."
            exit 1
          }
          Write-Host "Смоук-тест пройден: .exe стартует и корректно завершается."

      - name: Sign executable
        if: env.HAS_SIGNING == 'true'
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: pwsh ./scripts/sign.ps1 -Path "dist/OptiCIP-Dashboard.exe"

      - name: Download WebView2 bootstrapper
        run: Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "MicrosoftEdgeWebview2Setup.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.app_version.outputs.value }} installer.iss'

      - name: Sign installer
        if: env.HAS_SIGNING == 'true'
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: pwsh ./scripts/sign.ps1 -Path "installer_out/OptiCIP-Dashboard-Setup.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: OptiCIP-Dashboard-windows
          path: |
            dist/OptiCIP-Dashboard.exe
            installer_out/OptiCIP-Dashboard-Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        # Публикуем СРАЗУ боевым релизом (без --draft/--prerelease): приложение
        # читает releases/latest, а тот пропускает и черновики, и пре-релизы —
        # иначе релиз выйдет, но клиенты его не увидят.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "installer_out/OptiCIP-Dashboard-Setup.exe" `
            "dist/OptiCIP-Dashboard.exe" `
            --repo "${{ github.repository }}" `
            --title "OptiCIP Dashboard ${{ steps.app_version.outputs.value }}" `
            --generate-notes
